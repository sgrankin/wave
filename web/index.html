<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wave</title>
    <!-- Inline favicon (a brand-blue rounded square) so the browser's automatic
         /favicon.ico request doesn't 404. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%234060c0'/%3E%3C/svg%3E"
    />
    <style>
      /* The app shell (<wave-app>) is a full-window two-pane layout (height:100vh),
         so the page itself is full-bleed: no body max-width (which used to cap the
         whole app at 760px so it never grew with the window) and no page chrome. */
      html, body { margin: 0; height: 100%; }
      body { font-family: system-ui, sans-serif; }
    </style>
  </head>
  <body>
    <script type="module" src="/main.js"></script>
  </body>
</html>
