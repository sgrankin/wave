<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Wave</title>
    <meta name="theme-color" content="#4060c0" />
    <!-- PWA: installable app shell. Icon + manifest + (iOS) home-screen hints. -->
    <link rel="icon" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Wave" />
    <style>
      /* The app shell (<wave-app>) is a full-window layout; the page is full-bleed.
         dvh (not vh) so the layout uses the *dynamic* viewport — correct under a
         mobile browser's collapsing address bar. */
      html, body { margin: 0; height: 100%; }
      body { font-family: system-ui, sans-serif; }
    </style>
  </head>
  <body>
    <script type="module" src="/main.js"></script>
    <script>
      // Register the service worker (only fires in a secure context — HTTPS or
      // localhost; over plain-HTTP tailscale it silently no-ops, app still works).
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
