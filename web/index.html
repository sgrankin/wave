<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Wave</title>
    <meta name="theme-color" content="#4060c0" />
    <!-- PWA: installable app shell. SVG favicon for modern browsers, PNG fallback so
         Chrome stops warning; PNG apple-touch-icon for the iOS home screen. -->
    <link rel="icon" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Wave" />
    <style>
      /* The app shell (<wave-app>) is a full-window layout; the page is full-bleed.
         dvh (not vh) so the layout uses the *dynamic* viewport — correct under a
         mobile browser's collapsing address bar. */
      html, body { margin: 0; height: 100%; }
      body { font-family: system-ui, sans-serif; }
      /* iOS Safari zooms the viewport when a focused input/contenteditable has a
         sub-16px font (and never zooms back). Force >=16px on every text-entry surface
         on touch devices so focusing a blip or a field doesn't shift the layout. */
      @media (pointer: coarse) {
        input, textarea, [contenteditable="true"] { font-size: 16px !important; }
      }
    </style>
  </head>
  <body>
    <script type="module" src="/main.js"></script>
    <script>
      // Register the service worker (only fires in a secure context — HTTPS or
      // localhost; over plain-HTTP tailscale it silently no-ops, app still works).
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
