# golangci-lint v1 configuration. See docs/architecture for project conventions.
run:
  timeout: 5m

linters:
  # Defaults (errcheck, gosimple, govet, ineffassign, staticcheck, unused) plus:
  enable:
    - bodyclose
    - gocritic
    - goimports
    - misspell
    - revive
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/sgrankin/wave
  revive:
    rules:
      - name: exported
        disabled: false

issues:
  # Relax a few linters in tests where strictness adds noise, not safety.
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
