# golangci-lint v2 configuration. The linter itself is pinned as a tool
# dependency in go.mod (run via `go tool golangci-lint run`), so it builds with
# the module's own Go toolchain. See docs/architecture for project conventions.
version: "2"
linters:
  # Defaults (errcheck, govet, ineffassign, staticcheck, unused) plus:
  enable:
    - bodyclose
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam
  settings:
    revive:
      rules:
        - name: exported
          disabled: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Relax a few linters in tests where strictness adds noise, not safety.
      - linters:
          - errcheck
          - unparam
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/sgrankin/wave
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
